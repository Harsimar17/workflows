name: Keep Alive

on:
  schedule:
    - cron: '*/2 * * * *'
  workflow_dispatch:

jobs:
  commit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Update activity log
        run: echo "$(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> activity.log

      - name: Commit and push
        run: |
          git config user.name "Harsimar17"
          git config user.email "harsimarpreet.singh05@gmail.com"
          git add activity.log
          git commit -m "chore: keep-alive $(date -u '+%Y-%m-%d %H:%M')"
          git push origin main
